<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ADN Components — Audio Delivery Network</title>
  <meta name="description" content="Drop-in web components for audio playback, uploads, and waveform visualization. Part of Audio Delivery Network." />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0f;
      color: #e4e4f0;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      max-width: 480px;
      width: 100%;
      padding: 2rem;
      text-align: center;
    }
    .logo {
      font-size: 0.875rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: #7878a0;
      margin-bottom: 1.5rem;
    }
    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 0.75rem;
    }
    p {
      color: #7878a0;
      line-height: 1.6;
      margin-bottom: 2rem;
    }
    .links {
      display: flex;
      gap: 0.75rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    .links a {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.625rem 1.25rem;
      border-radius: 0.5rem;
      font-size: 0.9rem;
      font-weight: 500;
      text-decoration: none;
      transition: background 0.15s, border-color 0.15s;
    }
    .links a.primary {
      background: #6d5dfc;
      color: #fff;
    }
    .links a.primary:hover { background: #5b4de0; }
    .links a.secondary {
      background: transparent;
      color: #e4e4f0;
      border: 1px solid #2a2a3e;
    }
    .links a.secondary:hover { border-color: #4a4a6e; }
    .links a svg { flex-shrink: 0; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">Audio Delivery Network</div>
    <h1>ADN Components</h1>
    <p>Drop-in web components for audio playback, uploads, and waveform visualization. Component docs have moved to the main documentation site.</p>
    <div class="links">
      <a class="primary" href="https://docs.audiodeliverynetwork.com/" rel="noopener noreferrer">
        Documentation
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
      </a>
      <a class="secondary" href="https://audiodeliverynetwork.com/" rel="noopener noreferrer">
        Website
      </a>
    </div>
  </div>
</body>
</html>
